<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#040810">
    <title>Floovu Legal | Portal de Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        :root {
            --navy-deep:   #03050a;
            --navy-card:   #080c14;
            --navy-card2:  #0b1020;
            --gold:        #c9a84c;
            --gold-bright: #e8cc7a;
            --gold-dim:    rgba(201,168,76,0.1);
            --gold-glow:   rgba(201,168,76,0.15);
            --silver:      #7a8fa6;
            --silver-lt:   #a8bdd0;
            --white:       #eef2f7;
            --border:      rgba(255,255,255,0.07);
            --border-gold: rgba(201,168,76,0.25);
            --kpi-ok:      #22c55e;
            --kpi-alert:   #f97316;
            --radius-sm:   8px;
            --radius-md:   12px;
            --radius-lg:   18px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size: 16px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 4px; }

        body {
            background: var(--navy-deep);
            color: var(--white);
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* ── NOISE ── */
        .noise-overlay {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            pointer-events:none; z-index:9999;
            opacity: 0.035; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* ── CURSOR ── */
        body, html {
            cursor: url("data:image/svg+xml;utf8,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='3' fill='%23C9A84C'/%3E%3Ccircle cx='12' cy='12' r='10' stroke='%23C9A84C' stroke-width='1' stroke-opacity='0.4'/%3E%3C/svg%3E") 12 12, auto !important;
        }
        a, button, input, select {
            cursor: url("data:image/svg+xml;utf8,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='4' fill='%23C9A84C'/%3E%3Ccircle cx='12' cy='12' r='8' stroke='%23C9A84C' stroke-width='1.5' stroke-opacity='0.8'/%3E%3C/svg%3E") 12 12, pointer !important;
        }

        /* ── LOGIN OVERLAY ── */
        .login-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: #020508;
            isolation: isolate;
        }
        .login-overlay.hidden { display: none; }

        #login-bg-canvas {
            position: absolute; top:0; left:0;
            width:100%; height:100%; z-index:0;
            pointer-events:none; display:block;
        }

        .login-overlay::after {
            content: '';
            position: absolute; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 55% 65% at 50% 52%, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.02) 40%, transparent 70%),
                radial-gradient(ellipse 80% 50% at 15% 80%, rgba(8,18,50,0.8) 0%, transparent 60%),
                radial-gradient(ellipse 80% 50% at 85% 20%, rgba(8,18,50,0.7) 0%, transparent 60%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(5,8,16,0.95);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 20px;
            padding: 2.5rem 2.25rem 2rem;
            width: 100%; max-width: 400px;
            position: relative; z-index: 1;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.025) inset;
        }
        .login-card::before {
            content: '';
            position: absolute; top:0; left:15%; right:15%;
            height:1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
        }

        .login-brand { text-align: center; margin-bottom: 2rem; }

        .login-luxury-title {
            position: relative; display: inline-block;
            margin-top: 1rem;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.45rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: transparent;
            background: linear-gradient(135deg, #b8882a 0%, #e8cc7a 35%, #fff8e0 52%, #e8cc7a 68%, #c9a84c 100%);
            -webkit-background-clip: text; background-clip: text;
            filter: drop-shadow(0 0 18px rgba(232,204,122,0.55)) drop-shadow(0 0 40px rgba(201,168,76,0.3));
            animation: titleShimmer 7s ease-in-out infinite;
        }
        .login-luxury-title::after {
            content: attr(data-text);
            position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,248,220,0.85) 48%, rgba(255,255,255,0.95) 52%, rgba(255,248,220,0.85) 55%, transparent 70%);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; background-size: 250% 100%;
            animation: titleFlare 11s ease-in-out infinite;
        }
        @keyframes titleShimmer {
            0%,100% { filter: drop-shadow(0 0 14px rgba(232,204,122,0.5)) drop-shadow(0 0 35px rgba(201,168,76,0.25)); }
            50%      { filter: drop-shadow(0 0 26px rgba(232,204,122,0.8)) drop-shadow(0 0 55px rgba(201,168,76,0.45)); }
        }
        @keyframes titleFlare {
            0%        { background-position: -100% 0; }
            55%,100%  { background-position: 250% 0; }
        }

        .login-error {
            background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm); padding: 10px 14px;
            font-size: 0.78rem; color: #ef4444; margin-bottom: 1rem; display: none;
        }

        .form-group { margin-bottom: 1.25rem; }
        .login-card label {
            font-size: 0.6rem; color: rgba(201,168,76,0.6);
            display: block; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 2px;
            font-weight: 700;
        }
        .login-card input {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-sm);
            padding: 0 12px;
            color: var(--white); height: 44px;
            outline: none; font-family: inherit; font-size: 0.88rem;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .login-card input:focus {
            border-color: rgba(201,168,76,0.35);
            background: rgba(201,168,76,0.02);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.05);
        }
        .login-card input::placeholder { color: var(--silver); opacity: 0.4; }

        .login-btn {
            width: 100%;
            background: transparent; color: var(--gold);
            border: 1px solid rgba(201,168,76,0.35);
            border-radius: 10px; padding: 13px;
            font-size: 0.82rem; font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; letter-spacing: 1px;
            text-transform: uppercase; margin-top: 1.25rem;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .login-btn::after {
            content: ''; position: absolute; top:0; left:-100%;
            width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.07), transparent);
            transition: left 0.5s;
        }
        .login-btn:hover { border-color: rgba(201,168,76,0.65); color: var(--white); box-shadow: 0 0 20px rgba(201,168,76,0.1); }
        .login-btn:hover::after { left: 100%; }
        .login-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── PORTAL SHELL ── */
        .portal-shell {
            display: none;
            min-height: 100vh;
            background:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(201,168,76,0.055) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 100% 100%, rgba(8,14,30,0.9) 0%, transparent 55%),
                var(--navy-deep);
        }
        .portal-shell.visible { display: block; }

        /* ── PORTAL HEADER ── */
        .portal-header {
            background: rgba(3,5,10,0.95);
            border-bottom: 1px solid rgba(201,168,76,0.1);
            padding: 0.875rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(20px);
            position: sticky; top:0; z-index: 50;
        }
        .portal-header-brand {
            display: flex; align-items: center; gap: 10px;
        }
        .portal-header-brand img { height: 36px; width: auto; object-fit: contain; }
        .portal-header-brand-text { display: flex; flex-direction: column; gap: 1px; }
        .portal-header-brand-text span:first-child {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem; color: var(--white); font-weight: 800; letter-spacing: 1px; line-height: 1;
        }
        .portal-header-brand-text span:last-child {
            font-size: 0.55rem; color: var(--gold); font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; line-height: 1;
        }
        .portal-header-right {
            display: flex; align-items: center; gap: 12px;
        }
        .portal-token-chip {
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 20px; padding: 4px 14px;
            font-size: 0.72rem; font-weight: 700;
            color: var(--gold); letter-spacing: 1px;
            font-family: 'Space Mono', monospace;
        }
        .portal-logout-btn {
            background: none; border: 1px solid rgba(255,255,255,0.07);
            color: var(--silver); border-radius: 8px;
            padding: 5px 12px; font-size: 0.72rem;
            font-family: inherit; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.5px;
        }
        .portal-logout-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--gold); }

        /* ── PORTAL CONTENT ── */
        .portal-content {
            max-width: 780px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ── CASE HEADER CARD ── */
        .case-header-card {
            background: linear-gradient(145deg, rgba(10,15,28,0.97), rgba(6,10,18,0.97));
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            position: relative; overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .case-header-card::before {
            content: '';
            position: absolute; top:0; left:0; right:0; height:1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
        }
        .case-header-card::after {
            content: '';
            position: absolute; top:0; right:0;
            width: 180px; height: 180px;
            background: radial-gradient(circle at top right, rgba(201,168,76,0.06), transparent 70%);
            pointer-events: none;
        }
        .case-header-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.25rem;
        }
        .case-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.4rem; font-weight: 700; color: var(--white);
            line-height: 1.2;
        }
        .case-status-badge {
            font-size: 0.62rem; font-weight: 800;
            padding: 4px 12px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 1.5px;
            flex-shrink: 0; margin-top: 2px;
        }
        .case-status-badge.activo   { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
        .case-status-badge.proceso  { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
        .case-status-badge.cerrado  { background: rgba(120,120,120,0.12); color: #888; border: 1px solid rgba(120,120,120,0.2); }

        .case-meta-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }
        .case-meta-item {}
        .case-meta-label {
            font-size: 0.58rem; text-transform: uppercase; letter-spacing: 2px;
            color: rgba(201,168,76,0.5); font-weight: 700; margin-bottom: 3px;
        }
        .case-meta-value {
            font-size: 0.85rem; color: var(--silver-lt); font-weight: 500;
        }
        .case-meta-value.highlight { color: var(--gold); font-weight: 700; }
        .case-meta-value.deadline-near { color: var(--kpi-alert); font-weight: 700; }

        /* ── SECTION TITLE ── */
        .section-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1rem; color: var(--gold);
            margin-bottom: 1rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(197,160,89,0.2);
            display: flex; align-items: center; gap: 8px;
        }

        /* ── TIMELINE ── */
        .timeline-container {
            background: linear-gradient(145deg, rgba(10,15,28,0.97), rgba(6,10,18,0.97));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            animation: slideUp 0.4s 0.1s cubic-bezier(0.16,1,0.3,1) both;
        }
        .timeline-list { position: relative; padding-left: 28px; }
        .timeline-list::before {
            content: '';
            position: absolute; left: 7px; top: 8px; bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, rgba(201,168,76,0.3), rgba(201,168,76,0.05));
        }
        .timeline-item {
            position: relative; margin-bottom: 1.5rem;
        }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-dot {
            position: absolute; left: -28px; top: 4px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--navy-deep);
            border: 2px solid rgba(201,168,76,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .timeline-dot.latest {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(201,168,76,0.4);
        }
        .timeline-dot.latest::after {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--gold);
        }
        .timeline-date {
            font-size: 0.62rem; color: rgba(201,168,76,0.5);
            text-transform: uppercase; letter-spacing: 1.5px;
            font-weight: 700; margin-bottom: 4px;
            font-family: 'Space Mono', monospace;
        }
        .timeline-content {
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            padding: 0.875rem 1rem;
            font-size: 0.84rem; color: var(--silver-lt);
            line-height: 1.65;
            transition: border-color 0.2s;
        }
        .timeline-item:hover .timeline-content {
            border-color: rgba(201,168,76,0.1);
        }
        .timeline-content-title {
            font-size: 0.78rem; font-weight: 700;
            color: var(--white); margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .timeline-empty {
            text-align: center; padding: 2rem;
            color: var(--silver); opacity: 0.5;
            font-size: 0.85rem;
        }

        /* ── DOCUMENTOS ── */
        .docs-container {
            background: linear-gradient(145deg, rgba(10,15,28,0.97), rgba(6,10,18,0.97));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            animation: slideUp 0.4s 0.2s cubic-bezier(0.16,1,0.3,1) both;
        }
        .doc-btn {
            display: flex; align-items: center; gap: 12px;
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md);
            padding: 0.875rem 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none; color: inherit;
        }
        .doc-btn:hover {
            border-color: rgba(201,168,76,0.2);
            background: rgba(201,168,76,0.03);
        }
        .doc-btn:last-child { margin-bottom: 0; }
        .doc-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .doc-info { flex: 1; text-align: left; }
        .doc-name {
            font-size: 0.82rem; color: var(--white);
            font-weight: 600; margin-bottom: 2px;
        }
        .doc-meta {
            font-size: 0.68rem; color: var(--silver); opacity: 0.7;
        }
        .doc-arrow {
            color: rgba(201,168,76,0.4); font-size: 0.9rem; flex-shrink: 0;
        }
        .docs-empty {
            text-align: center; padding: 1.5rem;
            color: var(--silver); opacity: 0.45;
            font-size: 0.82rem;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9998;
            background: linear-gradient(145deg, #0c1220, #080d18);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: var(--radius-md);
            padding: 0.875rem 1.25rem;
            font-size: 0.9rem; color: var(--white);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            transform: translateY(16px); opacity: 0;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            max-width: min(340px, calc(100vw - 2rem)); pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.toast-error { border-color: rgba(239,68,68,0.4); }
        .toast.toast-ok    { border-color: rgba(201,168,76,0.4); }

        /* ── LOADER ── */
        .portal-loader {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 200px; gap: 12px;
        }
        .portal-loader-spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(201,168,76,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .portal-loader p {
            font-size: 0.78rem; color: var(--silver);
            opacity: 0.6; letter-spacing: 2px;
            text-transform: uppercase;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

        /* ── FOOTER ── */
        .portal-footer {
            text-align: center; padding: 1rem 0;
            margin-top: 2rem;
        }
        .portal-footer a {
            color: var(--silver); opacity: 0.35;
            font-size: 0.62rem; text-decoration: none;
            letter-spacing: 2px; text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .portal-footer a:hover { opacity: 0.7; }

        /* ── BACK LINK ── */
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--silver); text-decoration: none;
            font-size: 0.75rem; opacity: 0.6;
            transition: opacity 0.2s; margin-top: 1.25rem;
        }
        .back-link:hover { opacity: 1; color: var(--gold); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .portal-content { padding: 1.25rem 1rem 3rem; }
            .case-header-card { padding: 1.25rem; }
            .timeline-container { padding: 1.25rem; }
            .docs-container { padding: 1.25rem; }
            .case-title { font-size: 1.15rem; }
            .portal-header { padding: 0.75rem 1rem; }
            .login-card {
                max-width: calc(100vw - 2rem) !important;
                padding: 1.75rem 1.25rem 1.5rem !important;
                margin: 0 1rem;
            }
            .toast { left: 1rem; right: 1rem; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <!-- ══ LOGIN ══ -->
    <div class="login-overlay" id="login-overlay">
        <canvas id="login-bg-canvas"></canvas>
        <div class="login-card">
            <div class="login-brand">
                <div style="text-align:center;margin-bottom:0.25rem;">
                    <img src="LEGAL AI ICONO.png" alt="Floovu Legal" style="width:100px;height:100px;object-fit:contain;">
                </div>
                <div class="login-luxury-title" data-text="Portal de Clientes">Portal de Clientes</div>
                <p style="color:var(--gold);opacity:0.8;font-weight:700;letter-spacing:4px;margin-top:6px;font-size:0.58rem;text-transform:uppercase;">Consulta tu expediente</p>
            </div>

            <div class="login-error" id="login-error"></div>

            <div class="form-group">
                <label for="input-token">Token del Caso</label>
                <div style="position:relative;">
                    <input type="text" id="input-token" placeholder="FLV-0000" autocomplete="off"
                        style="text-transform:uppercase;font-family:'Space Mono',monospace;letter-spacing:2px;"
                        oninput="this.value=this.value.toUpperCase()">
                </div>
            </div>

            <div class="form-group">
                <label for="input-nit">NIT / Cédula</label>
                <input type="text" id="input-nit" placeholder="Ej. 1234567890" autocomplete="off" inputmode="numeric">
            </div>

            <button class="login-btn" id="portal-login-btn" onclick="doPortalLogin()">
                Consultar Expediente →
            </button>

            <div style="text-align:center;margin-top:1.5rem;">
                <a href="index.html" class="back-link">← Volver al acceso del equipo</a>
            </div>

            <p style="text-align:center;font-size:0.55rem;color:var(--silver);margin-top:1.5rem;opacity:0.3;letter-spacing:2px;text-transform:uppercase;">
                Acceso seguro · Solo lectura
            </p>
            <div style="text-align:center;margin-top:1rem;">
                <img src="floovu_logo.png" alt="Floovu" style="max-height:28px;width:auto;opacity:0.6;">
            </div>
        </div>
    </div>

    <!-- ══ PORTAL SHELL ══ -->
    <div class="portal-shell" id="portal-shell">

        <header class="portal-header">
            <div class="portal-header-brand">
                <img src="LEGAL AI ICONO.png" alt="Floovu Legal">
                <div class="portal-header-brand-text">
                    <span>FLOOVU</span>
                    <span>Portal de Clientes</span>
                </div>
            </div>
            <div class="portal-header-right">
                <span class="portal-token-chip" id="header-token-chip">FLV-0000</span>
                <button class="portal-logout-btn" onclick="doLogout()">Salir</button>
            </div>
        </header>

        <div class="portal-content" id="portal-content">
            <div class="portal-loader" id="portal-loader">
                <div class="portal-loader-spinner"></div>
                <p>Cargando expediente...</p>
            </div>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ══ CONFIG ══
    const WEBHOOK_URL = 'https://automatizaciones-vs1-n8n.h5jpeh.easypanel.host/webhook/floovu-get-portal-cliente'; // ← reemplazar

    // ══ CANVAS BACKGROUND (igual al login del admin) ══
    (function initCanvas() {
        const canvas = document.getElementById('login-bg-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W, H, particles = [], animId;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((W * H) / 16000);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.2,
                    a: Math.random() * Math.PI * 2,
                    s: (Math.random() - 0.5) * 0.2,
                    opacity: Math.random() * 0.35 + 0.05
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.a += p.s * 0.01;
                p.x += Math.cos(p.a) * 0.15;
                p.y += Math.sin(p.a) * 0.15;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(201,168,76,${p.opacity})`;
                ctx.fill();
            });
            animId = requestAnimationFrame(draw);
        }

        resize(); initParticles(); draw();
        window.addEventListener('resize', () => { resize(); initParticles(); });
    })();

    // ══ TOAST ══
    function showToast(msg, type = 'ok') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show toast-${type}`;
        clearTimeout(t._tid);
        t._tid = setTimeout(() => t.classList.remove('show'), 3200);
    }

    // ══ LOGIN ══
    async function doPortalLogin() {
        const token = document.getElementById('input-token').value.trim().toUpperCase();
        const nit_cedula = document.getElementById("input-nit").value.trim();
        const errEl = document.getElementById('login-error');
        const btn   = document.getElementById('portal-login-btn');

        errEl.style.display = 'none';

        if (!token || !token.startsWith('FLV-')) {
            errEl.textContent = 'Ingresa un token válido (ej. FLV-1234)';
            errEl.style.display = 'block'; return;
        }
        if (!nit_cedula || nit_cedula.length < 4) {
            errEl.textContent = 'Ingresa tu número de cédula o NIT';
            errEl.style.display = 'block'; return;
        }

        btn.disabled = true;
        btn.textContent = 'Consultando...';

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, nit_cedula })
            });

            const data = await res.json();

            if (!res.ok || data.error) {
                errEl.textContent = data.message || 'Token o cédula incorrectos. Verifica tus datos.';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Consultar Expediente →';
                return;
            }

            // Guardar en sesión (solo para esta pestaña)
            sessionStorage.setItem('flv_case', JSON.stringify(data));
            sessionStorage.setItem('flv_token', token);

            showPortal(data, token);

        } catch (e) {
            errEl.textContent = 'No se pudo conectar. Intenta de nuevo.';
            errEl.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Consultar Expediente →';
        }
    }

    // ── Enter key ──
    document.getElementById('input-nit').addEventListener('keydown', e => {
        if (e.key === 'Enter') doPortalLogin();
    });
    document.getElementById('input-token').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('input-nit').focus();
    });

    // ══ SHOW PORTAL ══
    function showPortal(data, token) {
        document.getElementById('login-overlay').classList.add('hidden');
        const shell = document.getElementById('portal-shell');
        shell.classList.add('visible');
        document.getElementById('header-token-chip').textContent = token;
        renderPortal(data);
    }

    // ══ RENDER ══
    function renderPortal(d) {
        const content = document.getElementById('portal-content');

        // Estado badge
        const estadoMap = {
            'Activo': 'activo', 'En Proceso': 'proceso',
            'Cerrado': 'cerrado', 'Archivado': 'cerrado'
        };
        const estadoKey = estadoMap[d.estado] || 'proceso';

        // Vencimiento
        let vencimientoClass = '';
        let vencimientoVal   = d.vencimiento || '—';
        if (d.vencimiento) {
            const diff = (new Date(d.vencimiento) - new Date()) / (1000 * 60 * 60 * 24);
            if (diff < 15) vencimientoClass = 'deadline-near';
        }

        // ── Case Header ──
        const headerHTML = `
        <div class="case-header-card">
            <div class="case-header-top">
                <div>
                    <div class="case-title">${esc(d.cliente || 'Cliente')}</div>
                    <div style="font-size:0.75rem;color:var(--silver);margin-top:4px;opacity:0.8;">${esc(d.rama || '')} ${d.rama && d.radicado ? '·' : ''} ${esc(d.radicado || '')}</div>
                </div>
                <span class="case-status-badge ${estadoKey}">${esc(d.estado || 'En Proceso')}</span>
            </div>
            <div class="case-meta-grid">
                <div class="case-meta-item">
                    <div class="case-meta-label">Token del Caso</div>
                    <div class="case-meta-value highlight" style="font-family:'Space Mono',monospace;">${esc(d.token || '—')}</div>
                </div>
                <div class="case-meta-item">
                    <div class="case-meta-label">Abogado Asignado</div>
                    <div class="case-meta-value">${esc(d.abogado || '—')}</div>
                </div>
                <div class="case-meta-item">
                    <div class="case-meta-label">Fecha de Ingreso</div>
                    <div class="case-meta-value">${formatDate(d.fecha_ingreso) || '—'}</div>
                </div>
                <div class="case-meta-item">
                    <div class="case-meta-label">Próximo Vencimiento</div>
                    <div class="case-meta-value ${vencimientoClass}">${formatDate(vencimientoVal) || '—'}</div>
                </div>
            </div>
        </div>`;

        // ── Timeline ──
        const anotaciones = Array.isArray(d.anotaciones) ? d.anotaciones : [];
        let timelineItems = '';
        if (anotaciones.length === 0) {
            timelineItems = `<div class="timeline-empty">No hay actualizaciones registradas aún.</div>`;
        } else {
            anotaciones.forEach((a, i) => {
                const isLatest = i === 0;
                timelineItems += `
                <div class="timeline-item">
                    <div class="timeline-dot ${isLatest ? 'latest' : ''}"></div>
                    <div class="timeline-date">${formatDate(a.fecha) || '—'}</div>
                    <div class="timeline-content">
                        ${a.titulo ? `<div class="timeline-content-title">${esc(a.titulo)}</div>` : ''}
                        <div>${esc(a.texto || '')}</div>
                    </div>
                </div>`;
            });
        }

        const timelineHTML = `
        <div class="timeline-container">
            <div class="section-title">📋 Historial de Actualizaciones</div>
            <div class="timeline-list">${timelineItems}</div>
        </div>`;

        // ── Documentos ──
        const docs = Array.isArray(d.documentos) ? d.documentos : [];
        let docsInner = '';
        if (docs.length === 0) {
            docsInner = `<div class="docs-empty">No hay documentos disponibles por el momento.</div>`;
        } else {
            docs.forEach(doc => {
                docsInner += `
                <a href="${esc(doc.url || '#')}" target="_blank" rel="noopener noreferrer" class="doc-btn">
                    <div class="doc-icon">📄</div>
                    <div class="doc-info">
                        <div class="doc-name">${esc(doc.nombre || 'Documento')}</div>
                        <div class="doc-meta">${esc(doc.tipo || 'PDF')} ${doc.fecha ? '· ' + formatDate(doc.fecha) : ''}</div>
                    </div>
                    <span class="doc-arrow">↗</span>
                </a>`;
            });
        }

        const docsHTML = `
        <div class="docs-container">
            <div class="section-title">📎 Documentos del Expediente</div>
            ${docsInner}
        </div>`;

        const footerHTML = `
        <div class="portal-footer">
            <a href="index.html">← Acceso del equipo</a>
        </div>`;

        content.innerHTML = headerHTML + timelineHTML + docsHTML + footerHTML;
    }

    // ══ LOGOUT ══
    function doLogout() {
        sessionStorage.removeItem('flv_case');
        sessionStorage.removeItem('flv_token');
        document.getElementById('portal-shell').classList.remove('visible');
        document.getElementById('login-overlay').classList.remove('hidden');
        document.getElementById('input-token').value = '';
        document.getElementById('input-nit').value = '';
        document.getElementById('portal-login-btn').disabled = false;
        document.getElementById('portal-login-btn').textContent = 'Consultar Expediente →';
        document.getElementById('login-error').style.display = 'none';
    }

    // ══ UTILS ══
    function esc(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(str) {
        if (!str || str === '—') return str;
        try {
            const d = new Date(str);
            if (isNaN(d)) return str;
            return d.toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
        } catch { return str; }
    }

    // ══ AUTO-RESTORE SESSION ══
    (function restoreSession() {
        const cached = sessionStorage.getItem('flv_case');
        const token  = sessionStorage.getItem('flv_token');
        if (cached && token) {
            try { showPortal(JSON.parse(cached), token); } catch {}
        }
    })();
    </script>
</body>
</html>
